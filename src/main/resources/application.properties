# ============================================
# Spring Boot Application Configuration
# ============================================

# Application Name
spring.application.name=weather-forecast

# Server Configuration
# Port on which the application will run
server.port=8080

# ============================================
# OpenWeatherMap API Configuration
# ============================================

# OpenWeatherMap API Key
# IMPORTANT: Replace 'YOUR_API_KEY_HERE' with your actual API key
# Get your free API key from: https://openweathermap.org/api
openweathermap.api.key=YOUR_API_KEY_HERE

# OpenWeatherMap API Base URL
openweathermap.api.url=https://api.openweathermap.org/data/2.5/weather

# OpenWeatherMap Forecast API URL (5-day forecast)
openweathermap.forecast.url=https://api.openweathermap.org/data/2.5/forecast

# OpenWeatherMap One Call API URL (8-day forecast)
openweathermap.onecall.url=https://api.openweathermap.org/data/3.0/onecall

# ============================================
# Logging Configuration
# ============================================

# Set logging level for the application
logging.level.com.weather.forecast=INFO

# Log pattern for console output
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# HTTP Client Configuration
# ============================================

# Connection timeout in milliseconds (10 seconds)
spring.webflux.timeout.connect=10000

# Read timeout in milliseconds (10 seconds)
spring.webflux.timeout.read=10000

